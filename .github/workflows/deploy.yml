name: Deploy Quartz Site via SFTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Copy config & layout
        run: cp quartz.config.ts quartz.layout.ts quartz/

      - name: Install dependencies
        run: npm ci
        working-directory: ./quartz

      - name: Build Quartz site
        run: npx quartz build --directory ../vault
        working-directory: ./quartz

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete
          path: quartz/public/
          remote_path: /home/dh_fm8qv6/docs.sublimeplants.com/
          remote_host: ${{ secrets.FTP_SERVER }}
          remote_user: ${{ secrets.FTP_USERNAME }}
          remote_key: ${{ secrets.FTP_SSH_KEY }}
